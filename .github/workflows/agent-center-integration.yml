name: agent-center-integration

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AGENT_DATA_PATH: ${{ github.workspace }}/agents/agents
      SKILL_DATA_PATH: ${{ github.workspace }}/agents/skills
      BACKEND_BASE_URL: http://127.0.0.1:8000
      FRONTEND_BASE_URL: http://127.0.0.1:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Start backend
        working-directory: backend
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup pnpm dev --host 127.0.0.1 --port 3000 > /tmp/frontend.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..60}; do
            if curl -sSf http://127.0.0.1:8000/health >/dev/null && curl -sSf http://127.0.0.1:3000/frontend/health >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -sSf http://127.0.0.1:8000/health >/dev/null
          curl -sSf http://127.0.0.1:3000/frontend/health >/dev/null

      - name: Run integration test
        working-directory: backend
        run: pytest tests/test_agent_center_ci_integration.py -q
